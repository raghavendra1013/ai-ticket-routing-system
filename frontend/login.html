<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
overflow:hidden;
}

.welcome{
color:hsl(0, 13%, 94%);
text-shadow: 0 3px 12px rgba(0,0,0,0.8);
text-align:center;
margin-bottom:20px;
position:relative;
z-index:2;
}

.welcome h1{
margin:0;
font-size:32px;
}

.welcome p{
margin:5px 0 0;
font-size:14px;
opacity:0.9;
}

.cover{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-image:url("https://media.licdn.com/dms/image/v2/D5612AQEfCyX2apJMvA/article-cover_image-shrink_720_1280/B56Zf1wBOJG0AU-/0/1752174698194?e=2147483647&v=beta&t=32-aNmm-X3J3thTEuS2Fu3kRw5v6uHNmjQ6enpDxfBw");
}

.cover::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

.box{
background:white;
padding:35px;
border-radius:12px;
width:360px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
position:relative;
z-index:2;
}

.toggle{
display:flex;
margin-bottom:20px;
background:#eee;
border-radius:8px;
overflow:hidden;
}

.toggle button{
flex:1;
padding:10px;
border:none;
cursor:pointer;
background:transparent;
font-weight:bold;
}

.toggle .active{
background:#2a5298;
color:white;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.main-btn{
width:100%;
padding:12px;
background:#2a5298;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.hidden{
display:none;
}
</style>

</head>

<body>

<div class="welcome">
<h1>Welcome to Customer Support</h1>
<p>Smart AI-powered ticket management system</p>
</div>

<div class="cover"></div>

<div class="box">

<h2 id="title">Login</h2>

<div class="toggle">
<button id="loginTab" class="active" onclick="showLogin()">Login</button>
<button id="signupTab" onclick="showSignup()">Signup</button>
</div>

<div id="loginForm">
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<button class="main-btn" onclick="login()">Login</button>
</div>

<div id="signupForm" class="hidden">
<input id="signupUsername" placeholder="Username">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<button class="main-btn" onclick="signup()">Create Account</button>
</div>

</div>

<script>

function showLogin(){
loginForm.classList.remove("hidden");
signupForm.classList.add("hidden");
loginTab.classList.add("active");
signupTab.classList.remove("active");
title.innerText="Login";
}

function showSignup(){
signupForm.classList.remove("hidden");
loginForm.classList.add("hidden");
signupTab.classList.add("active");
loginTab.classList.remove("active");
title.innerText="Signup";
}

async function login(){

const username=loginUsername.value;
const password=loginPassword.value;

const res=await fetch("http://127.0.0.1:5000/send_otp",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
});

const data=await res.json();

if(data.message){

const otp = prompt("Enter OTP sent to your email:");

const verify = await fetch("http://127.0.0.1:5000/verify_otp",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,otp})
});

const result = await verify.json();

if(result.role){
localStorage.setItem("role",result.role);
localStorage.setItem("email",result.email);
localStorage.setItem("username",username);

if(result.role==="admin"){
window.location.href="dashboard.html";
}else{
window.location.href="index.html";
}

}else{
alert(result.error);
}

}else{
alert(data.error);
}
}

async function signup(){

const username=signupUsername.value;
const email=signupEmail.value;
const password=signupPassword.value;

if(!email.includes("@")){
alert("Enter valid email");
return;
}

const res=await fetch("http://127.0.0.1:5000/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,email,password})
});

const data=await res.json();

if(data.message){
alert("Signup successful! Please login.");
showLogin();
}else{
alert(data.error || "Signup failed");
}
}

</script>

</body>
</html>
