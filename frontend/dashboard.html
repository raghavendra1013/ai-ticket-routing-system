<!DOCTYPE html>
<html>

<head>
<title>Support Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#eef2f7;
font-family:'Segoe UI', Arial;
margin:0;
}

/* NAVBAR */
.navbar{
background:linear-gradient(135deg,#1e3c72,#2a5298);
padding:14px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
position:sticky;
top:0;
}

.nav-left{
display:flex;
gap:30px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
padding:6px 10px;
border-radius:6px;
}

.navbar a:hover{
background:rgba(255,255,255,0.15);
}

.navbar button{
background:#ff4d4d;
padding:7px 16px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
width:92%;
max-width:1200px;
margin:auto;
margin-top:40px;
}

.header{
text-align:center;
margin-bottom:35px;
}

.header h1{
color:#2a5298;
}

/* CARDS */
.cards{
display:flex;
gap:25px;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
flex:1;
min-width:220px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card h2{
color:#2a5298;
}

/* CHARTS */
.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

/* ✅ FIX START */
.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
height:350px;              /* FORCE SAME HEIGHT */
display:flex;
}

.chart-box canvas{
width:100% !important;
height:100% !important;
}
/* ✅ FIX END */

/* QUEUE */
.queue-section{
margin-top:40px;
}

.queue-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.queue-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.queue-card h3{
margin-top:0;
color:#2a5298;
}

.queue-item{
padding:8px;
border-bottom:1px solid #eee;
font-size:14px;
}

.queue-btn{
margin-top:10px;
padding:8px 12px;
background:#2a5298;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.queue-btn:hover{
background:#1e3c72;
}

@media(max-width:800px){
.charts{
grid-template-columns:1fr;
}
.queue-grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<script>
if(localStorage.getItem("role") !== "admin"){
alert("Admin access only");
window.location.href = "login.html";
}

function logout(){
localStorage.removeItem("role");
window.location.href = "login.html";
}
</script>

<div class="navbar">
<div class="nav-left">
<a href="tickets.html">Manage Tickets</a>
<a href="dashboard.html">Analytics Dashboard</a>
</div>
<button onclick="logout()">Logout</button>
</div>

<div class="dashboard">

<div class="header">
<h1>Analytics Dashboard</h1>
<p>AI Powered Ticket Monitoring</p>
</div>

<div class="cards">
<div class="card"><h3>Total Tickets</h3><h2 id="totalTickets">0</h2></div>
<div class="card"><h3>Open Tickets</h3><h2 id="openTickets">0</h2></div>
<div class="card"><h3>Resolved Tickets</h3><h2 id="resolvedTickets">0</h2></div>
<div class="card"><h3>Avg Resolution Time</h3><h2 id="resolutionTime">0</h2></div>
</div>

<div class="charts">
<div class="chart-box"><canvas id="categoryChart"></canvas></div>
<div class="chart-box"><canvas id="priorityChart"></canvas></div>
<div class="chart-box"><canvas id="agentChart"></canvas></div>
<div class="chart-box"><canvas id="performanceChart"></canvas></div>
</div>

<div class="queue-section">
<h2 style="text-align:center;color:#2a5298;">Agent Queues</h2>
<div id="queueContainer" class="queue-grid"></div>
</div>

</div>

<script>

async function loadDashboard(){
try{
const res = await fetch("http://127.0.0.1:5000/ticket_stats");

if(!res.ok){
const text = await res.text();
console.error("Dashboard error:", text);
return;
}

const data = await res.json();

document.getElementById("totalTickets").innerText = data.total;
document.getElementById("openTickets").innerText = data.open;
document.getElementById("resolvedTickets").innerText = data.resolved;
document.getElementById("resolutionTime").innerText = data.avg_resolution_time ? data.avg_resolution_time.toFixed(2) : 0;

const categories = data.categories || [];
const priorities = data.priorities || [];
const agents = data.agents || [];
const performance = data.agent_performance || [];

new Chart(document.getElementById("categoryChart"),{
type:"pie",
options:{responsive:true, maintainAspectRatio:false},   /* ✅ FIX */
data:{
labels: categories.length ? categories.map(c=>c[0]) : ["No Data"],
datasets:[{data: categories.length ? categories.map(c=>c[1]) : [1]}]
}
});

new Chart(document.getElementById("priorityChart"),{
type:"bar",
options:{responsive:true, maintainAspectRatio:false},   /* ✅ FIX */
data:{
labels: priorities.length ? priorities.map(p=>p[0]) : ["No Data"],
datasets:[{data: priorities.length ? priorities.map(p=>p[1]) : [0]}]
}
});

new Chart(document.getElementById("agentChart"),{
type:"bar",
options:{responsive:true, maintainAspectRatio:false},   /* ✅ FIX */
data:{
labels: agents.length ? agents.map(a=>a[0]) : ["No Data"],
datasets:[{data: agents.length ? agents.map(a=>a[1]) : [0]}]
}
});

new Chart(document.getElementById("performanceChart"),{
type:"bar",
options:{responsive:true, maintainAspectRatio:false},   /* ✅ FIX */
data:{
labels: performance.length ? performance.map(a=>a[0]) : ["No Data"],
datasets:[{data: performance.length ? performance.map(a=>a[1]) : [0]}]
}
});

}catch(err){
console.error("Dashboard crash:", err);
}
}

async function loadQueues(){
try{
const res = await fetch("http://127.0.0.1:5000/full_queue_status");

if(!res.ok){
const text = await res.text();
console.error("Queue error:", text);
return;
}

const data = await res.json();

const container = document.getElementById("queueContainer");
container.innerHTML = "";

for(let agent in data){

let html = `
<div class="queue-card">
<h3>${agent}</h3>
`;

if(data[agent].length === 0){
html += '<p>No tickets</p>';
}else{
data[agent].forEach(t=>{
html += `
<div class="queue-item">
#${t.position} - ${t.subject} (${t.priority})
</div>
`;
});
}

html += `
<button class="queue-btn" onclick="processNext('${agent}')">
Process Next
</button>
</div>
`;

container.innerHTML += html;
}

}catch(err){
console.error("Queue crash:", err);
}
}

async function processNext(agent){
try{
const res = await fetch(`http://127.0.0.1:5000/process_next/${agent}`,{
method:"POST"
});

if(!res.ok){
const text = await res.text();
alert(text);
return;
}

const data = await res.json();

alert(data.message || data.error);

loadQueues();
loadDashboard();

}catch(err){
console.error("Process error:", err);
}
}

loadDashboard();
loadQueues();

</script>

</body>
</html>
