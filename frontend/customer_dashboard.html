<!DOCTYPE html>
<html>
<head>
<title>Customer Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#eef2f7;
font-family:'Segoe UI';
margin:0;
}

/* NAVBAR */
.navbar{
background:linear-gradient(135deg,#1e3c72,#2a5298);
padding:14px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.nav-left{
display:flex;
gap:25px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
}

.navbar button{
background:#ff4d4d;
border:none;
padding:6px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* CONTAINER */
.container{
width:88%;
margin:auto;
margin-top:30px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* CHART GRID */
.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

/* CHART BOX */
.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
height:420px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* TITLES */
.chart-title{
font-weight:600;
margin-bottom:15px;
color:#2a5298;
}

/* CANVAS FIX */
canvas{
width:100% !important;
max-width:350px;
height:300px !important;
}
</style>

</head>

<body>

<div class="navbar">
<div class="nav-left">
<a href="index.html">Raise Ticket</a>
<a href="my_tickets.html">My Tickets</a>
<a href="customer_dashboard.html">Dashboard</a>
</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<h2 style="text-align:center;">Customer Dashboard</h2>

<div class="cards">
<div class="card"><h3>Total</h3><h2 id="total">0</h2></div>
<div class="card"><h3>Resolved</h3><h2 id="resolved">0</h2></div>
<div class="card"><h3>Open</h3><h2 id="open">0</h2></div>
<div class="card"><h3>High Priority</h3><h2 id="high">0</h2></div>
</div>

<div class="charts">

<div class="chart-box">
<div class="chart-title">Category Distribution</div>
<canvas id="categoryChart"></canvas>
</div>

<div class="chart-box">
<div class="chart-title">Ticket Status</div>
<canvas id="statusChart"></canvas>
</div>

</div>

</div>

<script>

if(localStorage.getItem("role") !== "customer"){
alert("Login required");
window.location.href="login.html";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

const email = localStorage.getItem("email");

let categoryChart, statusChart;

async function loadDashboard(){

const res = await fetch("http://127.0.0.1:5000/customer_stats",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})
});

const data = await res.json();

/* CARDS */
document.getElementById("total").innerText = data.total || 0;
document.getElementById("resolved").innerText = data.resolved || 0;
document.getElementById("open").innerText = (data.total - data.resolved) || 0;

/* HIGH PRIORITY */
let high = 0;
(data.priorities || []).forEach(p=>{
if(p[0]==="high") high = p[1];
});
document.getElementById("high").innerText = high;

/* DESTROY OLD CHARTS (important on reload) */
if(categoryChart) categoryChart.destroy();
if(statusChart) statusChart.destroy();

/* CATEGORY */
let catLabels = ["No Data"];
let catValues = [1];

if(data.categories && data.categories.length){
catLabels = data.categories.map(c=>c[0]);
catValues = data.categories.map(c=>c[1]);
}

categoryChart = new Chart(document.getElementById("categoryChart"),{
type:"pie",
data:{
labels:catLabels,
datasets:[{data:catValues}]
}
});

/* STATUS */
let statusLabels = ["No Data"];
let statusValues = [0];

if(data.status && data.status.length){
statusLabels = data.status.map(s=>s[0]);
statusValues = data.status.map(s=>s[1]);
}

statusChart = new Chart(document.getElementById("statusChart"),{
type:"bar",
data:{
labels:statusLabels,
datasets:[{
label:"Tickets",
data:statusValues
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
y:{
beginAtZero:true,
ticks:{precision:0}
}
}
}
});

}

loadDashboard();

</script>

</body>
</html>
